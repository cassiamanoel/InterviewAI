name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests (Placeholder)
        working-directory: ./backend
        run: |
          echo "Run pytest here when tests are ready"

      - name: Build Docker Image
        working-directory: ./backend
        run: |
          docker build -t interview-ai/backend:latest .

      - name: Deploy (Placeholder for AWS/Railway/Render)
        run: |
          echo "Push Docker Image to Registry and Deploy"
